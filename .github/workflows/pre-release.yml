name: Pre-release

on:
  push:
    branches: [main, "release/**"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push moving tag and :sha-<short>
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Read pre-release version (package.json + sha suffix)
        id: ver
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          echo "version=${PKG_VERSION}+sha.${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"

      # `:next` is what staging tracks for main. A release-branch build must
      # NOT push `:next` — that would flip staging between main and the
      # release branch. Instead each release/X.Y branch gets its own moving
      # tag `rc-X.Y`, so two concurrent release branches (e.g. release/0.9 and
      # release/0.10) never collide. The immutable :sha-<short> tag is pushed
      # in both cases below.
      - name: Choose moving tag
        id: tags
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "moving=next" >> "$GITHUB_OUTPUT"
          else
            RC="${GITHUB_REF_NAME#release/}"
            RC="${RC//\//-}"
            echo "moving=rc-${RC}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Pinchy image (moving tag + :sha-<short>)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.pinchy
          push: true
          tags: |
            ghcr.io/heypinchy/pinchy:${{ steps.tags.outputs.moving }}
            ghcr.io/heypinchy/pinchy:sha-${{ steps.sha.outputs.short }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PINCHY_VERSION=${{ steps.ver.outputs.version }}
            PINCHY_BUILD_SHA=${{ github.sha }}

      - name: Build and push OpenClaw image (moving tag + :sha-<short>)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.openclaw
          push: true
          tags: |
            ghcr.io/heypinchy/pinchy-openclaw:${{ steps.tags.outputs.moving }}
            ghcr.io/heypinchy/pinchy-openclaw:sha-${{ steps.sha.outputs.short }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PINCHY_VERSION=${{ steps.ver.outputs.version }}
            PINCHY_BUILD_SHA=${{ github.sha }}
