ignoreUntil = 2026-10-21
reason = "astro — docs static-site build tooling (docs/pnpm-lock.yaml), not shipped to users; XSS via unescaped attribute names, needs an SSR runtime with a global HTMLElement — not reachable in static output. Fixes only in astro 7.x, which Starlight 0.38 blocks. Tracked: #851"
