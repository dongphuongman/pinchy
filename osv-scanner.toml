# OSV Scanner configuration
# https://google.github.io/osv-scanner/configuration/

# Vulnerabilities in devDependencies that do not ship in the production Docker
# image. These packages are only present in the lockfile because
# openclaw (added as a devDependency for the schema-validation
# integration test) pulls them in. They have no impact on Pinchy users.
#
# MAL-2026-3432, GHSA-w5hq-g745-h8pq (uuid) and GHSA-q8mj-m7cp-5q26 (qs) were
# dropped 2026-07-21: osv-scanner reported them as UNUSED (fail-on-unused) — no
# lockfile package matches them anymore. GHSA-v2v4-37r5-5v8g stays (still used;
# MAL-2026-3432 is one of its aliases, so it remains covered). Re-add with a
# fresh reason if osv-scanner flags any of them again.

[[IgnoredVulns]]
id = "GHSA-v2v4-37r5-5v8g"
reason = "Transitive devDep via openclaw (test tool only — not in production build)"

# astro (docs/pnpm-lock.yaml) is the static-site generator that builds the
# documentation site AT BUILD TIME. It ships in no runtime image and reaches no
# Pinchy user. Beyond that, all three residual advisories are XSS bugs the
# upstream reports scope to on-demand SSR / the dev server only — statically
# prerendered output, which is all Starlight emits, is explicitly unaffected, so
# the built-and-deployed docs site carries no residual risk regardless of the
# deferred bump. They fix only in astro 7.x, which @astrojs/starlight 0.38 does
# not support (its peer is astro ^6); clearing them needs a coordinated
# Starlight major upgrade, tracked in #851. The one High-severity astro advisory
# (GHSA-vj59-8hwv-xxmv, 8.2) IS fixed here — astro is bumped to 6.4.8, resolved
# within the ^6 range. ignoreUntil forces a re-triage on 2026-10-21 so the
# exception cannot outlive #851 silently.

[[IgnoredVulns]]
id = "GHSA-4g3v-8h47-v7g6"
ignoreUntil = 2026-10-21
reason = "astro — docs static-site build tooling (docs/pnpm-lock.yaml), not shipped to users; reflected XSS in View Transitions, on-demand SSR / dev-server only — Starlight emits static HTML. Fixes only in astro 7.x, which Starlight 0.38 blocks. Tracked: #851"

[[IgnoredVulns]]
id = "GHSA-7pw4-f3q4-r2p2"
ignoreUntil = 2026-10-21
reason = "astro — docs static-site build tooling (docs/pnpm-lock.yaml), not shipped to users; reflected XSS in transition directives, on-demand SSR / dev-server only — statically prerendered output unaffected. Fixes only in astro 7.x, which Starlight 0.38 blocks. Tracked: #851"

[[IgnoredVulns]]
